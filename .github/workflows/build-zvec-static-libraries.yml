name: Build zvec Static Libraries

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'zvec/**'
      - '.github/workflows/build-zvec-static-libraries.yml'

jobs:
  # Linux x86_64 build only
  build-linux:
    name: Build Linux x86_64
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup CMake
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends cmake build-essential

      - name: Fix CMake compatibility
        run: |
          # Set CMake policy to allow newer versions
          export CMAKE_POLICY_VERSION_MINIMUM=3.5

      - name: Build zvec Linux
        run: |
          cd zvec
          mkdir -p build && cd build
          cmake -DCMAKE_POLICY_VERSION_MINIMUM=3.5 ..
          make -j$(nproc)

      - name: Copy libraries
        run: |
          mkdir -p lib
          cp zvec/build/lib/libzvec_core.a lib/libzvec_core-linux-x86_64.a
          cp zvec/build/lib/libzvec_ailego.a lib/libzvec_ailego-linux-x86_64.a
          # Get git hash
          GIT_HASH=$(cd zvec && git rev-parse --short HEAD)
          echo "GIT_HASH=$GIT_HASH" >> $GITHUB_ENV

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64-libs
          path: lib/

  # Commit libraries to repo
  commit-libraries:
    name: Commit libraries to repo
    needs: [build-linux]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-x86_64-libs
          path: lib/

      - name: Configure git
        run: |
          git config user.email "oliveagle@gmail.com"
          git config user.name "oliveagle"

      - name: Commit and push
        run: |
          git add lib/*.a
          if ! git diff --staged --quiet; then
            GIT_HASH=$(cd zvec && git rev-parse --short HEAD)
            git commit -m "Add pre-built static libraries (git: $GIT_HASH)"
            git push
          else
            echo "No changes to commit"
          fi
