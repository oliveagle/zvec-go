name: Build zvec Static Libraries

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'zvec/**'
      - '.github/workflows/build-zvec-static-libraries.yml'

jobs:
  # Linux x86_64 build
  build-linux:
    name: Build Linux x86_64
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup CMake
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends cmake build-essential

      - name: Fix CMake compatibility
        run: |
          # Fix cmake_minimum_required version for newer CMake
          # Fix bazel.cmake (uses VERSION 3.1)
          sed -i 's/cmake_minimum_required(VERSION 3.1 FATAL_ERROR)/cmake_minimum_required(VERSION 3.5 FATAL_ERROR)/g' zvec/cmake/bazel.cmake
          # Fix all thirdparty CMakeLists.txt files with various version formats
          find zvec/thirdparty -name "CMakeLists.txt" -exec sed -i 's/cmake_minimum_required(VERSION [0-9.]* FATAL_ERROR)/cmake_minimum_required(VERSION 3.5 FATAL_ERROR)/g' {} \;
          find zvec/thirdparty -name "*.cmake" -exec sed -i 's/cmake_minimum_required(VERSION [0-9.]* FATAL_ERROR)/cmake_minimum_required(VERSION 3.5 FATAL_ERROR)/g' {} \;

      - name: Build zvec Linux
        run: |
          cd zvec
          mkdir -p build && cd build
          cmake ..
          make -j$(nproc)

      - name: Copy libraries
        run: |
          mkdir -p lib
          cp zvec/build/lib/libzvec_core.a lib/libzvec_core-linux-x86_64.a
          cp zvec/build/lib/libzvec_ailego.a lib/libzvec_ailego-linux-x86_64.a
          # Get git hash
          GIT_HASH=$(cd zvec && git rev-parse --short HEAD)
          echo "GIT_HASH=$GIT_HASH" >> $GITHUB_ENV

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64-libs
          path: lib/

  # macOS arm64 build
  build-macos-arm64:
    name: Build macOS arm64
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Fix CMake compatibility
        run: |
          # Fix cmake_minimum_required version for newer CMake
          # Fix bazel.cmake
          sed -i '' 's/cmake_minimum_required(VERSION 3.1 FATAL_ERROR)/cmake_minimum_required(VERSION 3.5 FATAL_ERROR)/g' zvec/cmake/bazel.cmake
          # Fix all thirdparty CMakeLists.txt files
          find zvec/thirdparty -name "CMakeLists.txt" -exec sed -i '' 's/cmake_minimum_required(VERSION [0-9.]* FATAL_ERROR)/cmake_minimum_required(VERSION 3.5 FATAL_ERROR)/g' {} \;
          find zvec/thirdparty -name "*.cmake" -exec sed -i '' 's/cmake_minimum_required(VERSION [0-9.]* FATAL_ERROR)/cmake_minimum_required(VERSION 3.5 FATAL_ERROR)/g' {} \;

      - name: Build zvec macOS arm64
        run: |
          cd zvec
          mkdir -p build && cd build
          cmake ..
          make -j$(sysctl -n hw.ncpu)

      - name: Copy libraries
        run: |
          mkdir -p lib
          cp zvec/build/lib/libzvec_core.a lib/libzvec_core-macos-arm64.a
          cp zvec/build/lib/libzvec_ailego.a lib/libzvec_ailego-macos-arm64.a
          # Get git hash
          GIT_HASH=$(cd zvec && git rev-parse --short HEAD)
          echo "GIT_HASH=$GIT_HASH" >> $GITHUB_ENV

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-libs
          path: lib/

  # macOS x86_64 build
  build-macos-x86_64:
    name: Build macOS x86_64
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Fix CMake compatibility
        run: |
          # Fix cmake_minimum_required version for newer CMake
          # Fix bazel.cmake
          sed -i '' 's/cmake_minimum_required(VERSION 3.1 FATAL_ERROR)/cmake_minimum_required(VERSION 3.5 FATAL_ERROR)/g' zvec/cmake/bazel.cmake
          # Fix all thirdparty CMakeLists.txt files
          find zvec/thirdparty -name "CMakeLists.txt" -exec sed -i '' 's/cmake_minimum_required(VERSION [0-9.]* FATAL_ERROR)/cmake_minimum_required(VERSION 3.5 FATAL_ERROR)/g' {} \;
          find zvec/thirdparty -name "*.cmake" -exec sed -i '' 's/cmake_minimum_required(VERSION [0-9.]* FATAL_ERROR)/cmake_minimum_required(VERSION 3.5 FATAL_ERROR)/g' {} \;

      - name: Build zvec macOS x86_64
        run: |
          cd zvec
          mkdir -p build && cd build
          cmake ..
          make -j$(sysctl -n hw.ncpu)

      - name: Copy libraries
        run: |
          mkdir -p lib
          cp zvec/build/lib/libzvec_core.a lib/libzvec_core-macos-x86_64.a
          cp zvec/build/lib/libzvec_ailego.a lib/libzvec_ailego-macos-x86_64.a

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-x86_64-libs
          path: lib/

  # Windows x86_64 build
  build-windows:
    name: Build Windows x86_64
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Fix CMake compatibility
        run: |
          # Fix cmake_minimum_required version for newer CMake
          # Fix bazel.cmake
          (Get-Content zvec/cmake/bazel.cmake) -replace 'cmake_minimum_required\(VERSION 3.1 FATAL_ERROR\)', 'cmake_minimum_required(VERSION 3.5 FATAL_ERROR)' | Set-Content zvec/cmake/bazel.cmake
          # Fix all thirdparty CMakeLists.txt files
          Get-ChildItem -Path zvec/thirdparty -Recurse -Filter CMakeLists.txt | ForEach-Object {
            $content = (Get-Content $_.FullName) -replace 'cmake_minimum_required\(VERSION [0-9.]* FATAL_ERROR\)', 'cmake_minimum_required(VERSION 3.5 FATAL_ERROR)'
            $content | Set-Content $_.FullName
          }
          Get-ChildItem -Path zvec/thirdparty -Recurse -Filter *.cmake | ForEach-Object {
            $content = (Get-Content $_.FullName) -replace 'cmake_minimum_required\(VERSION [0-9.]* FATAL_ERROR\)', 'cmake_minimum_required(VERSION 3.5 FATAL_ERROR)'
            $content | Set-Content $_.FullName
          }

      - name: Build zvec Windows
        run: |
          cd zvec
          mkdir build
          cd build
          cmake .. -G "Visual Studio 17 2022" -A x64
          cmake --build . --config Release -j

      - name: Copy libraries
        run: |
          mkdir lib
          Copy-Item zvec/build/Release/libzvec_core.lib lib/libzvec_core-windows-x86_64.lib
          Copy-Item zvec/build/Release/libzvec_ailego.lib lib/libzvec_ailego-windows-x86_64.lib

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64-libs
          path: lib/

  # Commit and push libraries back to repo
  commit-libraries:
    name: Commit libraries to repo
    needs: [build-linux, build-macos-arm64, build-macos-x86_64, build-windows]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-x86_64-libs
          path: lib/

      - name: Download macOS arm64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-arm64-libs
          path: lib/

      - name: Download macOS x86_64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-x86_64-libs
          path: lib/

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-x86_64-libs
          path: lib/

      - name: Configure git
        run: |
          git config user.email "oliveagle@gmail.com"
          git config user.name "oliveagle"

      - name: Commit and push
        run: |
          git add lib/*.a lib/*.lib
          if ! git diff --staged --quiet; then
            GIT_HASH=$(cd zvec && git rev-parse --short HEAD)
            git commit -m "Add pre-built static libraries (git: $GIT_HASH)"
            git push
          else
            echo "No changes to commit"
          fi
